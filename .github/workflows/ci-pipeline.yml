name: CI Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'corretto'
          cache: 'gradle'

      - name: 빌드 권한 부여
        run: chmod +x ./gradlew

      - name: 테스트 실행
        # Testcontainers가 MySQL을 자체적으로 띄우므로 별도 서비스 컨테이너 불필요
        run: ./gradlew clean test

      - name: 테스트 결과 보고서 업로드
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: |
            ./build/reports/tests/
            ./build/reports/problems/
          retention-days: 7
