name: CD Pipeline — Backend

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/membershipflow-backend

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Copy nginx config to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: nginx/nginx.conf
          target: /opt/membershipflow/nginx/
          strip_components: 1

      - name: Prepare Grafana directories on EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # scp는 덮어쓰기만 하고 삭제된/변경된 파일을 지우지 않아 git과 서버가
            # 어긋날 수 있음(#191) — 매 배포마다 클린 싱크가 되도록 완전히 비우고 재생성.
            # grafana_data(실제 DB) 볼륨은 별개라 영향 없음
            sudo rm -rf /opt/membershipflow/grafana/provisioning
            sudo mkdir -p /opt/membershipflow/grafana/provisioning/datasources
            sudo mkdir -p /opt/membershipflow/grafana/provisioning/dashboards
            sudo chown -R ubuntu:ubuntu /opt/membershipflow/grafana

      - name: Copy Grafana provisioning to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "grafana/provisioning/"
          target: /opt/membershipflow/
          strip_components: 0

      - name: Copy docker-compose.yml to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: docker-compose.yml
          target: /opt/membershipflow/

      - name: Copy Prometheus configuration to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "prometheus/"
          target: /opt/membershipflow/
          strip_components: 0

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /opt/membershipflow
            echo ${{ secrets.GITHUB_TOKEN }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            docker run --rm --entrypoint /bin/promtool \
              -v "$PWD/prometheus:/etc/prometheus:ro" \
              prom/prometheus:latest \
              check config /etc/prometheus/prometheus.yml
            docker compose pull backend
            docker compose up -d --no-deps backend
            docker compose up -d node-exporter
            docker compose up -d --no-deps --force-recreate prometheus
            docker compose restart nginx grafana
            docker image prune -f
