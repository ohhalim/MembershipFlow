name: CD Pipeline

on:
  workflow_dispatch:     # 수동 실행만 허용 (EC2 준비 후 push 트리거로 변경)

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'corretto'
          cache: 'gradle'

      - name: 빌드 권한 부여
        run: chmod +x ./gradlew

      - name: JAR 빌드 (테스트 제외)
        run: ./gradlew clean build -x test --no-daemon

      - name: Docker Hub 로그인
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Docker 이미지 빌드 및 푸시
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # 이미지 태그: latest + git SHA (롤백 시 특정 버전 지정 가능)
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/membershipflow:latest
            ${{ secrets.DOCKER_USERNAME }}/membershipflow:${{ github.sha }}

      - name: EC2 배포 (SSH)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # 최신 이미지 Pull
            docker pull ${{ secrets.DOCKER_USERNAME }}/membershipflow:latest

            # 기존 컨테이너 중지 및 제거
            docker stop membershipflow || true
            docker rm membershipflow || true

            # 새 컨테이너 실행
            docker run -d \
              --name membershipflow \
              --restart always \
              -p 8081:8081 \
              -e DB_URL=${{ secrets.DB_URL }} \
              -e DB_USERNAME=${{ secrets.DB_USERNAME }} \
              -e DB_PASSWORD=${{ secrets.DB_PASSWORD }} \
              ${{ secrets.DOCKER_USERNAME }}/membershipflow:latest

            # 사용하지 않는 이미지 정리
            docker image prune -f
