name: DB 자동 백업

on:
  schedule:
    - cron: '0 19 * * *' # 매일 KST 04:00 (UTC 19:00)
  workflow_dispatch:

jobs:
  backup:
    runs-on: ubuntu-latest

    steps:
      - name: SSH → mysqldump 백업 (14일 보관)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            mkdir -p ~/backups
            FILE=~/backups/membershipflow_$(date +%Y%m%d_%H%M%S).sql.gz
            docker exec membershipflow-mysql-1 sh -c \
              'exec mysqldump --single-transaction --routines --triggers -u root -p"$MYSQL_ROOT_PASSWORD" membershipflow' \
              | gzip > "$FILE"
            # 빈 파일이면 실패 처리
            [ -s "$FILE" ] || { echo "백업 파일이 비어 있음"; rm -f "$FILE"; exit 1; }
            # 14일 지난 백업 삭제
            find ~/backups -name 'membershipflow_*.sql.gz' -mtime +14 -delete
            echo "백업 완료: $FILE ($(du -h "$FILE" | cut -f1))"
            ls -lh ~/backups | tail -5
