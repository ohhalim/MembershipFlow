apiVersion: 1

# #188: 배치 하트비트 알림 — CollectService/BillingScheduler가 끝까지 실행 완료될 때마다
# 갱신하는 게이지(collect_last_run_timestamp_seconds / billing_last_run_timestamp_seconds)가
# 26시간(매일 1회 크론 + 여유) 넘게 갱신되지 않으면 배치가 죽었거나 안 돌았다고 보고 알림한다.
# 메트릭 자체가 안 보이는 상태(백엔드 다운 등)도 noDataState: Alerting으로 알림 대상에 포함.
groups:
  - orgId: 1
    name: batch-heartbeat
    folder: Batch Heartbeat
    interval: 5m
    rules:
      - uid: collect-batch-stale
        title: "시세 수집 배치 26시간 이상 미실행"
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: prometheus
            model:
              expr: time() - collect_last_run_timestamp_seconds
              instant: true
              refId: A
          - refId: C
            datasourceUid: __expr__
            model:
              type: threshold
              expression: A
              conditions:
                - evaluator:
                    type: gt
                    params: [93600]
              refId: C
        noDataState: Alerting
        execErrState: Alerting
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "collect_last_run_timestamp_seconds가 26시간 넘게 갱신되지 않았습니다 — 시세 수집 스케줄러(매일 07시) 확인 필요"

      - uid: billing-batch-stale
        title: "정기결제 배치 26시간 이상 미실행"
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: prometheus
            model:
              expr: time() - billing_last_run_timestamp_seconds
              instant: true
              refId: A
          - refId: C
            datasourceUid: __expr__
            model:
              type: threshold
              expression: A
              conditions:
                - evaluator:
                    type: gt
                    params: [93600]
              refId: C
        noDataState: Alerting
        execErrState: Alerting
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "billing_last_run_timestamp_seconds가 26시간 넘게 갱신되지 않았습니다 — 정기결제 스케줄러(매일 00시) 확인 필요"
