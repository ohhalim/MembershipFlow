global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - '/etc/prometheus/alerts.yml'

scrape_configs:
  - job_name: 'membershipflow-backend'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['backend:8081']

  - job_name: 'membershipflow-host'
    static_configs:
      - targets: ['node-exporter:9100']
