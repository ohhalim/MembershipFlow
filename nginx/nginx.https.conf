events { worker_connections 1024; }

http {
    upstream backend  { server backend:8081; }
    upstream frontend { server frontend:3000; }

    # HTTP → HTTPS redirect + Let's Encrypt challenge
    server {
        listen 80;
        server_name membershipflow.site www.membershipflow.site;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }
        location / {
            return 301 https://$host$request_uri;
        }
    }

    server {
        listen 443 ssl;
        server_name membershipflow.site www.membershipflow.site;

        ssl_certificate     /etc/letsencrypt/live/membershipflow.site/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/membershipflow.site/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 10m;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        location /api/ {
            proxy_pass http://backend;
        }
        location /oauth2/ {
            proxy_pass http://backend;
        }
        location /login/ {
            proxy_pass http://backend;
        }
        # actuator 외부 차단
        location /actuator/ {
            deny all;
        }
        location / {
            proxy_pass http://frontend;
        }
    }
}
