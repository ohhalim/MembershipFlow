events { worker_connections 1024; }

http {
    upstream backend  { server backend:8081; }
    upstream frontend { server frontend:3000; }

    # HTTP → HTTPS redirect + Let's Encrypt challenge
    server {
        listen 80;
        server_name membershipflow.site www.membershipflow.site;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }
        location / {
            return 301 https://$host$request_uri;
        }
    }

    server {
        listen 443 ssl;
        server_name membershipflow.site www.membershipflow.site;

        ssl_certificate     /etc/letsencrypt/live/membershipflow.site/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/membershipflow.site/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 10m;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        location /api/ {
            proxy_pass http://backend;
        }
        location /oauth2/ {
            proxy_pass http://backend;
        }
        location /login/oauth2/ {
            proxy_pass http://backend;
        }
        # WebSocket (STOMP/SockJS) — backend로 라우팅 + Upgrade 핸드셰이크
        location /ws {
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_read_timeout 3600s;
        }
        # /admin/* 는 퍼블릭 프록시 대상이 아님 — 실제 트리거는
        # `docker exec <nginx> wget http://<backend>:8081/admin/collect` 형태로
        # backend 컨테이너를 내부망에서 직접 호출하며 nginx를 거치지 않는다.
        # 이 location이 있으면 외부에서도 인증 없이 /admin/collect를 호출할 수 있으므로 차단한다.
        location /admin/ {
            deny all;
        }
        # actuator 외부 차단
        location /actuator/ {
            deny all;
        }
        location / {
            proxy_pass http://frontend;
        }
    }
}
